---
# Debian/Ubuntu System Setup

- name: Update Apt Cache and Upgrade System
  apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Check if reboot is required
  stat:
    path: /var/run/reboot-required
  register: reboot_required

- name: Reboot if required
  reboot:
    msg: "Rebooting to apply system updates"
  when: reboot_required.stat.exists

- name: Install Essential Tools (Host)
  apt:
    name:
      - git
      - vim
      - ufw
      - fail2ban
      - openssh-server
      - sudo
      - curl
      - gnupg
      - lsb-release
      - python3
      - python3-venv
      - podman
    state: present

- name: Install uv
  shell: curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: /root/.local/bin/uv

- name: Install Podman Compose (via uv)
  command: /root/.local/bin/uv pip install --system --break-system-packages podman-compose
  register: uv_result
  changed_when: "'Installed' in uv_result.stdout"

# Tailscale Installation
- name: Add Tailscale GPG Key
  shell: |
    curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/$(lsb_release -cs).noarmor.gpg | tee /usr/share/keyrings/tailscale-archive-keyring.gpg >/dev/null
  args:
    creates: /usr/share/keyrings/tailscale-archive-keyring.gpg
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Add Tailscale Repository (Ubuntu)
  shell: |
    curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/$(lsb_release -cs).tailscale-keyring.list | tee /etc/apt/sources.list.d/tailscale.list
  args:
    creates: /etc/apt/sources.list.d/tailscale.list
  when: ansible_facts['distribution'] == 'Ubuntu'
  
- name: Add Tailscale Repository (Debian)
  shell: |
     curl -fsSL https://pkgs.tailscale.com/stable/debian/$(lsb_release -cs).tailscale-keyring.list | tee /etc/apt/sources.list.d/tailscale.list
  args:
     creates: /etc/apt/sources.list.d/tailscale.list
  when: ansible_facts['distribution'] == 'Debian'

- name: Update Apt Cache (Tailscale)
  apt:
    update_cache: true

- name: Install Tailscale
  apt:
    name: tailscale
    state: present

# User Setup
- name: Create OpenClaw User
  user:
    name: "{{ openclaw_user }}"
    comment: "OpenClaw Service User"
    shell: /bin/bash
    create_home: true
    home: "{{ openclaw_home }}"
    state: present

- name: Authorize New SSH Key for OpenClaw User
  authorized_key:
    user: "{{ openclaw_user }}"
    state: present
    key: "{{ deploy_public_key }}"

- name: Setup OpenClaw .ssh Directory
  file:
    path: "{{ openclaw_home }}/.ssh"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0700'

# Rootless Podman Setup
- name: Enable Lingering for OpenClaw User
  command: "loginctl enable-linger {{ openclaw_user }}"
  args:
    creates: "/var/lib/systemd/linger/{{ openclaw_user }}"

- name: Start and Enable Tailscale
  systemd:
    name: tailscaled
    state: started
    enabled: true

- name: Authenticate Tailscale
  command: tailscale up --authkey={{ tailscale_key }}

- name: Get Tailscale tailnet suffix
  shell: tailscale status --json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['Self']['DNSName'].split('.', 1)[1].rstrip('.'))"
  register: tailscale_dns_result
  changed_when: false

- name: Set tailscale_tailnet fact
  set_fact:
    tailscale_tailnet: "{{ tailscale_dns_result.stdout }}"